<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- WebView mobile: không cho pinch-zoom (user-scalable=no) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>teleheath</title>
    <style>
      html, body { margin: 0; background: #ffffff; }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
      }
      #initial-loader .il-spinner {
        width: 36px;
        height: 36px;
        color: #e22a36;
        animation: il-spin 1s linear infinite;
      }
      @keyframes il-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <svg
        class="il-spinner"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
