name: Sync to repo B

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest   # đổi qua ubuntu cho nhẹ + stable hơn macos

    steps:
      - name: Checkout repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "hali1814"
          git config user.email "tanhao1852000@gmail.com"

      - name: Create extra commit (optional)
        run: |
          echo "synced at $(date)" > sync.txt
          git add -A
          git commit -m "chore: sync from repo A" || echo "no changes"

      - name: Push to repo B
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
           git ls-remote https://x-access-token:${TOKEN}@github.com/hali1814/teleheath-fe.git
