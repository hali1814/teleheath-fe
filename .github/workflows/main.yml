name: Sync to repo B

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "sync-bot"
          git config user.email "bot@sync.com"

      - name: Create extra commit (optional)
        run: |
          echo "synced at $(date)" > sync.txt
          git add .
          git commit -m "chore: sync from repo A" || echo "no changes"

      - name: Push to repo B
        run: |
          git remote add target  https://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@github.com/hali1814/teleheath-fe.git
          git push target HEAD:master --force
